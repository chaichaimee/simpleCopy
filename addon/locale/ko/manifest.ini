summary = "simpleCopy"
description = """궁극의 캡처 파워: URL, 텍스트, 마지막으로 말한 단어; 이 모든 것을 더 빠르고 스마트하게 손끝에서 제어하세요
단축키:
CTRL+Shift+A
한 번 탭: URL 복사
 두 번 탭: 하이퍼링크 복사
CTRL+Shift+C
한 번 탭: 텍스트 복사 및 추가
 두 번 탭: 클립보드 지우기
F9
한 번 탭: 마지막 음성 복사
Double Tap : 마지막 음성 추가
Triple Tap : 마지막 음성까지 복사
Quadruple Tap : 음성 녹음 파일 열기"""