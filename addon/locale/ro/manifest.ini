description = """Putere de captură supremă: URL-uri, text, ultimele cuvinte rostite; totul la îndemâna ta, mai rapid și mai inteligent
Taste rapide:
CTRL+Shift+A
O singură atingere: Copiază URL
 Atingere dublă: Copiază hyperlink
CTRL+Shift+C
